name: Build APK via PWA2APK API

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Request APK generation
        run: |
          curl -X POST https://pwa2apk.com/api/generate \
            -H "Content-Type: application/json" \
            -d '{"url":"https://gbrhomidi.github.io/Educational-platform/"}' \
            -o apk.zip
      - name: Unzip and upload
        run: |
          unzip apk.zip -d ./apk
      - uses: actions/upload-artifact@v4
        with:
          name: app-release
          path: ./apk/*.apk
